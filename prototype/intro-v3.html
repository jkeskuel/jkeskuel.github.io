<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Intro v3 — blueprint hero</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
	:root {
		--bg-1: #fbfcfe;
		--bg-2: #eef2f7;
		--ink: #0f172a;
		--ink-2: #1e293b;
		--ink-soft: #475569;
		--ink-faint: #94a3b8;
		--rule: #e2e8f0;
		--accent: #2563eb;
		--accent-soft: #93c5fd;
		--glass: rgba(15, 23, 42, 0.06);
	}
	* { box-sizing: border-box; }
	html, body {
		margin: 0; padding: 0;
		background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
		color: var(--ink);
		font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
		font-size: 16px;
		line-height: 1.5;
		-webkit-font-smoothing: antialiased;
		min-height: 100vh;
		overflow-x: hidden;
	}

	.stage {
		position: relative;
		min-height: 100vh;
		padding: 36px 56px;
		display: flex;
		flex-direction: column;
	}
	@media (max-width: 720px) {
		.stage { padding: 24px 24px; }
	}

	/* Monogram */
	.monogram {
		font-weight: 600;
		font-size: 22px;
		letter-spacing: -0.02em;
		color: var(--ink);
		display: flex;
		align-items: center;
		gap: 2px;
		opacity: 0;
	}
	.monogram .dot {
		display: inline-block;
		width: 6px; height: 6px;
		border-radius: 50%;
		background: var(--accent);
		margin-left: 2px;
		transform: translateY(7px);
	}

	/* Hero grid */
	.hero {
		flex: 1;
		display: grid;
		grid-template-columns: 1.1fr 1fr;
		gap: 60px;
		align-items: center;
		margin-top: 40px;
	}
	@media (max-width: 900px) {
		.hero {
			grid-template-columns: 1fr;
			gap: 32px;
			margin-top: 24px;
		}
	}

	/* Left side */
	.wordmark {
		font-weight: 300;
		font-size: clamp(56px, 11vw, 140px);
		line-height: 0.95;
		letter-spacing: -0.04em;
		color: var(--ink);
		margin: 0;
		display: flex;
		flex-direction: column;
	}
	.wordmark span {
		display: block;
		opacity: 0;
	}
	.underline {
		width: 80px;
		height: 3px;
		background: var(--accent);
		margin: 32px 0 24px;
		transform-origin: left center;
		transform: scaleX(0);
	}
	.tagline {
		display: flex;
		align-items: center;
		gap: 14px;
		flex-wrap: wrap;
		color: var(--ink-soft);
		font-size: 15px;
		font-weight: 400;
		letter-spacing: 0.01em;
		margin: 0;
	}
	.tagline > * { opacity: 0; }
	.tagline .bullet {
		display: inline-block;
		width: 5px; height: 5px;
		border-radius: 50%;
		background: var(--accent);
	}

	/* Right side illustration */
	.illustration {
		position: relative;
		aspect-ratio: 1.1 / 1;
		width: 100%;
	}
	.illustration svg {
		width: 100%;
		height: 100%;
		overflow: visible;
	}

	/* Side labels */
	.side-labels {
		position: absolute;
		top: 22%;
		left: 14%;
		display: flex;
		flex-direction: column;
		gap: 18px;
		padding: 22px 18px;
		border: 1px solid var(--rule);
		border-radius: 12px;
		background: rgba(255, 255, 255, 0.55);
		backdrop-filter: blur(6px);
		font-size: 10px;
		font-weight: 500;
		letter-spacing: 0.32em;
		color: var(--ink-soft);
	}
	.side-labels::before {
		content: "";
		position: absolute;
		top: 14px; left: 18px;
		width: 22px; height: 2px;
		background: var(--accent);
	}
	.side-labels > div { opacity: 0; }

	/* Scroll hint */
	.scroll-hint {
		margin-top: auto;
		display: flex;
		align-items: center;
		gap: 12px;
		font-size: 11px;
		font-weight: 500;
		letter-spacing: 0.32em;
		color: var(--ink-faint);
		opacity: 0;
		padding-top: 40px;
	}
	.scroll-hint::before {
		content: "";
		display: inline-block;
		width: 80px; height: 1px;
		background: var(--ink-faint);
		opacity: 0.4;
	}
	.scroll-hint .pulse {
		display: inline-block;
		width: 6px; height: 6px;
		border-radius: 50%;
		background: var(--accent);
	}

	/* Replay */
	.replay {
		position: fixed;
		bottom: 24px; right: 24px;
		font: inherit; font-size: 12px;
		padding: 6px 14px;
		background: rgba(255, 255, 255, 0.85);
		border: 1px solid var(--rule);
		border-radius: 999px;
		color: var(--ink-soft);
		cursor: pointer;
		backdrop-filter: blur(6px);
		letter-spacing: 0.12em;
		text-transform: uppercase;
	}
	.replay:hover { color: var(--ink); border-color: var(--ink-faint); }

	/* SVG element styling */
	.bg-dot { fill: var(--ink-faint); opacity: 0; }
	.flow-path { fill: none; stroke: var(--accent); stroke-width: 1; opacity: 0.5; }
	.cube-layer { opacity: 0; }
	.beam { opacity: 0; }
	.platform-line { opacity: 0; stroke: var(--ink-faint); stroke-width: 0.5; }

	@media (prefers-reduced-motion: reduce) {
		.monogram, .wordmark span, .underline, .tagline > *,
		.side-labels > div, .scroll-hint, .bg-dot, .cube-layer, .beam, .platform-line {
			opacity: 1 !important;
			transform: none !important;
		}
		.underline { transform: scaleX(1) !important; }
		.replay { display: none; }
	}
</style>
</head>
<body>

<div class="stage">
	<div class="monogram">JK<span class="dot"></span></div>

	<div class="hero">
		<div class="hero-left">
			<h1 class="wordmark">
				<span>Jure</span>
				<span>Kranjc</span>
			</h1>
			<div class="underline"></div>
			<p class="tagline">
				<span>Database Consultant</span>
				<i class="bullet"></i>
				<span>System Architecture</span>
				<i class="bullet"></i>
				<span>Performance</span>
			</p>
		</div>

		<div class="hero-right">
			<div class="illustration">
				<svg viewBox="0 0 600 540" xmlns="http://www.w3.org/2000/svg">
					<defs>
						<linearGradient id="cubeBlue" x1="0" y1="0" x2="0" y2="1">
							<stop offset="0%" stop-color="#3b82f6" stop-opacity="0.55"/>
							<stop offset="100%" stop-color="#2563eb" stop-opacity="0.25"/>
						</linearGradient>
						<linearGradient id="cubeGlass" x1="0" y1="0" x2="0" y2="1">
							<stop offset="0%" stop-color="#1e293b" stop-opacity="0.08"/>
							<stop offset="100%" stop-color="#1e293b" stop-opacity="0.18"/>
						</linearGradient>
						<linearGradient id="cubeGlassMid" x1="0" y1="0" x2="0" y2="1">
							<stop offset="0%" stop-color="#1e293b" stop-opacity="0.04"/>
							<stop offset="100%" stop-color="#1e293b" stop-opacity="0.12"/>
						</linearGradient>
						<radialGradient id="topGlow" cx="0.5" cy="0.3" r="0.6">
							<stop offset="0%" stop-color="#60a5fa" stop-opacity="0.55"/>
							<stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
						</radialGradient>
					</defs>

					<!-- Background dots (blueprint scatter) -->
					<g id="bg-dots"></g>

					<!-- Flow curves -->
					<path class="flow-path" d="M -20 380 C 120 380 180 320 260 320 S 420 380 580 360" stroke-dasharray="2 3" />
					<path class="flow-path" d="M -20 440 C 100 440 200 410 320 410 S 480 460 620 440" />
					<path class="flow-path" d="M 60 100 C 140 100 160 160 240 160" stroke-dasharray="1 4" />

					<!-- Light beams above cube -->
					<g id="beams">
						<line class="beam" x1="340" y1="20" x2="340" y2="180" stroke="#93c5fd" stroke-width="1" stroke-dasharray="2 4"/>
						<line class="beam" x1="380" y1="40" x2="380" y2="180" stroke="#94a3b8" stroke-width="0.5"/>
						<line class="beam" x1="420" y1="10" x2="420" y2="180" stroke="#60a5fa" stroke-width="1.5"/>
						<line class="beam" x1="460" y1="60" x2="460" y2="180" stroke="#94a3b8" stroke-width="0.5"/>
						<circle class="beam" cx="340" cy="20" r="2.5" fill="#60a5fa"/>
						<circle class="beam" cx="420" cy="10" r="3" fill="#2563eb"/>
						<circle class="beam" cx="460" cy="60" r="2" fill="#94a3b8"/>
					</g>

					<!-- Glow behind top cube -->
					<ellipse class="cube-layer" cx="400" cy="220" rx="120" ry="50" fill="url(#topGlow)" data-layer="4" />

					<!-- Cube stack (bottom to top) -->
					<!-- Platform base -->
					<g class="cube-layer" data-layer="0">
						<rect x="270" y="430" width="280" height="50" rx="6" fill="#ffffff" stroke="#e2e8f0" stroke-width="1"/>
						<rect x="290" y="438" width="240" height="34" rx="4" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="0.5"/>
					</g>

					<!-- Layer 1 (bottom dark) -->
					<g class="cube-layer" data-layer="1">
						<rect x="310" y="370" width="200" height="68" rx="6" fill="url(#cubeGlass)" stroke="#cbd5e1" stroke-width="0.8"/>
						<g opacity="0.4">
							<circle cx="330" cy="395" r="1" fill="#475569"/>
							<circle cx="345" cy="395" r="1" fill="#475569"/>
							<circle cx="360" cy="395" r="1" fill="#475569"/>
							<circle cx="375" cy="395" r="1" fill="#475569"/>
							<circle cx="390" cy="395" r="1" fill="#475569"/>
							<circle cx="330" cy="410" r="1" fill="#475569"/>
							<circle cx="345" cy="410" r="1" fill="#475569"/>
							<circle cx="360" cy="410" r="1" fill="#475569"/>
							<circle cx="375" cy="410" r="1" fill="#475569"/>
							<circle cx="330" cy="425" r="1" fill="#475569"/>
							<circle cx="345" cy="425" r="1" fill="#475569"/>
						</g>
					</g>

					<!-- Layer 2 -->
					<g class="cube-layer" data-layer="2">
						<rect x="320" y="310" width="180" height="62" rx="6" fill="url(#cubeGlassMid)" stroke="#cbd5e1" stroke-width="0.8"/>
					</g>

					<!-- Layer 3 -->
					<g class="cube-layer" data-layer="3">
						<rect x="330" y="252" width="160" height="58" rx="6" fill="url(#cubeGlassMid)" stroke="#cbd5e1" stroke-width="0.8"/>
					</g>

					<!-- Layer 4 (top, blue glowing) -->
					<g class="cube-layer" data-layer="4">
						<rect x="340" y="190" width="140" height="58" rx="8" fill="url(#cubeBlue)" stroke="#60a5fa" stroke-width="1"/>
						<rect x="358" y="208" width="104" height="22" rx="2" fill="#2563eb" opacity="0.35"/>
					</g>

					<!-- Faint scattered dots near platform -->
					<g opacity="0.6">
						<circle class="platform-line" cx="240" cy="470" r="2" fill="#94a3b8" stroke="none"/>
						<circle class="platform-line" cx="580" cy="450" r="1.5" fill="#94a3b8" stroke="none"/>
						<circle class="platform-line" cx="600" cy="490" r="2" fill="#2563eb" stroke="none"/>
					</g>
				</svg>

				<div class="side-labels">
					<div>DATA</div>
					<div>STRUCTURE</div>
					<div>PERFORMANCE</div>
					<div>INSIGHT</div>
				</div>
			</div>
		</div>
	</div>

	<div class="scroll-hint">
		<span class="pulse"></span>
		SCROLL TO EXPLORE
	</div>
</div>

<button class="replay" id="replay">Replay</button>

<script src="https://cdn.jsdelivr.net/npm/animejs@3.2.2/lib/anime.min.js"></script>
<script>
(function () {
	// Sprinkle background dots procedurally.
	const dotsGroup = document.getElementById('bg-dots');
	const seed = [
		[50, 80, 1], [80, 120, 1.5], [120, 60, 1], [40, 200, 1], [70, 260, 1.5],
		[110, 340, 1], [30, 380, 1], [560, 80, 1.5], [580, 120, 1], [540, 180, 1],
		[600, 240, 1.5], [580, 300, 1], [560, 60, 1], [520, 40, 1.5], [180, 40, 1],
		[260, 30, 1], [340, 50, 1], [440, 30, 1.5], [490, 60, 1],
		[150, 480, 1], [200, 500, 1.5], [80, 460, 1], [120, 510, 1],
		[170, 90, 1], [220, 70, 1.5], [60, 150, 1], [100, 220, 1],
	];
	seed.forEach(([x, y, r]) => {
		const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
		c.setAttribute('class', 'bg-dot');
		c.setAttribute('cx', x);
		c.setAttribute('cy', y);
		c.setAttribute('r', r);
		dotsGroup.appendChild(c);
	});

	// Set initial transforms.
	anime.set('.cube-layer', { translateY: 40 });
	anime.set('.side-labels > div', { translateX: 16 });
	anime.set('.wordmark span', { translateY: 40 });
	anime.set('.monogram', { translateY: -10 });
	anime.set('.beam', {});
	anime.set('.flow-path', function (el) {
		const len = el.getTotalLength();
		el.style.strokeDasharray = el.getAttribute('stroke-dasharray') || len;
		if (!el.getAttribute('stroke-dasharray')) {
			el.style.strokeDashoffset = len;
		}
		return 0;
	});

	function run() {
		// Reset.
		anime.remove('*');
		anime.set('.cube-layer', { opacity: 0, translateY: 40 });
		anime.set('.side-labels > div', { opacity: 0, translateX: 16 });
		anime.set('.wordmark span', { opacity: 0, translateY: 40 });
		anime.set('.tagline > *', { opacity: 0, translateY: 8 });
		anime.set('.underline', { scaleX: 0 });
		anime.set('.bg-dot', { opacity: 0 });
		anime.set('.beam', { opacity: 0 });
		anime.set('.platform-line', { opacity: 0 });
		anime.set('.monogram', { opacity: 0, translateY: -10 });
		anime.set('.scroll-hint', { opacity: 0 });

		// Reset flow path dashoffsets.
		document.querySelectorAll('.flow-path').forEach(p => {
			const len = p.getTotalLength();
			if (!p.getAttribute('stroke-dasharray') || p.getAttribute('stroke-dasharray').includes(' ')) {
				// Dashed paths already have a pattern; animate opacity instead.
				p.style.opacity = 0;
			} else {
				p.style.strokeDasharray = len;
				p.style.strokeDashoffset = len;
			}
		});

		const tl = anime.timeline({
			easing: 'easeOutCubic',
		});

		tl
			// 1. Monogram in
			.add({
				targets: '.monogram',
				opacity: [0, 1],
				translateY: [-10, 0],
				duration: 600,
			})
			// 2. Background dots scatter in
			.add({
				targets: '.bg-dot',
				opacity: [0, 0.55],
				delay: anime.stagger(18, { from: 'center' }),
				duration: 500,
			}, '-=400')
			// 3. Flow curves
			.add({
				targets: '.flow-path',
				opacity: [0, 0.55],
				strokeDashoffset: [anime.setDashoffset, 0],
				duration: 1200,
				easing: 'easeInOutQuad',
				delay: anime.stagger(120),
			}, '-=500')
			// 4. Platform appears
			.add({
				targets: '.cube-layer[data-layer="0"]',
				opacity: [0, 1],
				translateY: [20, 0],
				duration: 500,
			}, '-=800')
			// 5. Cubes stack bottom-up
			.add({
				targets: ['.cube-layer[data-layer="1"]', '.cube-layer[data-layer="2"]', '.cube-layer[data-layer="3"]', '.cube-layer[data-layer="4"]'],
				opacity: [0, 1],
				translateY: [40, 0],
				delay: anime.stagger(140),
				duration: 700,
				easing: 'easeOutBack',
			}, '-=300')
			// 6. Platform dots
			.add({
				targets: '.platform-line',
				opacity: [0, 0.7],
				duration: 400,
				delay: anime.stagger(80),
			}, '-=400')
			// 7. Light beams above
			.add({
				targets: '.beam',
				opacity: [0, 1],
				delay: anime.stagger(60),
				duration: 500,
			}, '-=600')
			// 8. Side labels slide in
			.add({
				targets: '.side-labels > div',
				opacity: [0, 1],
				translateX: [16, 0],
				delay: anime.stagger(70),
				duration: 500,
			}, '-=700')
			// 9. Wordmark
			.add({
				targets: '.wordmark span',
				opacity: [0, 1],
				translateY: [40, 0],
				delay: anime.stagger(140),
				duration: 800,
				easing: 'easeOutExpo',
			}, '-=1500')
			// 10. Underline draw
			.add({
				targets: '.underline',
				scaleX: [0, 1],
				duration: 500,
				easing: 'easeOutQuart',
			}, '-=400')
			// 11. Tagline
			.add({
				targets: '.tagline > *',
				opacity: [0, 1],
				translateY: [8, 0],
				delay: anime.stagger(70),
				duration: 400,
			}, '-=300')
			// 12. Scroll hint
			.add({
				targets: '.scroll-hint',
				opacity: [0, 0.85],
				duration: 600,
			}, '-=100')
			.add({
				targets: '.scroll-hint .pulse',
				scale: [1, 1.4, 1],
				duration: 1400,
				easing: 'easeInOutSine',
				loop: true,
			});
	}

	const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
	if (!reduced) run();

	document.getElementById('replay').addEventListener('click', run);
})();
</script>

</body>
</html>
